# MongoDB local/dev — tách khỏi app stack. Production HUIT dùng Mongo ngoài (Atlas/VM).
# Volume + container name cố định để tránh mất data khi đổi thư mục compose.
#
#   pnpm stack:db
#   # .env: MONGODB_URI=mongodb://host.docker.internal:27017/idx_api  (app trong Docker)
#   # hoặc:  MONGODB_URI=mongodb://localhost:27017/idx_api           (app native)

services:
  mongo:
    image: mongo:7
    container_name: idx-chat-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - idx_chat_mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  idx_chat_mongodata:
    name: idx_chat_mongodata