# App stack only — MongoDB quản lý riêng (docker-compose.db.yml local hoặc Atlas/VM qua MONGODB_URI).
services:
  idx-api:
    build:
      context: .
      dockerfile: apps/idx-api/Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: ${MONGODB_URI:?MONGODB_URI is required in .env}
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  idx-chat-user:
    build:
      context: .
      dockerfile: apps/user-chat/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      IDX_API_URL: ${IDX_API_URL:?IDX_API_URL is required in .env}
      IDX_API_INTERNAL_URL: http://idx-api:4000
      IDX_SERVICE_SECRET: ${IDX_SERVICE_SECRET:?IDX_SERVICE_SECRET is required in .env}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required in .env}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-3600}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-false}
      ALLOW_GUEST_CHAT: ${ALLOW_GUEST_CHAT:-true}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required in .env}
      SELF_SERVICE_PASSWORD_RESET_ENABLED: ${SELF_SERVICE_PASSWORD_RESET_ENABLED:-false}
    ports:
      - "3003:3000"
    depends_on:
      idx-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  idx-chat-admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      IDX_API_URL: ${IDX_API_URL:?IDX_API_URL is required in .env}
      IDX_API_INTERNAL_URL: http://idx-api:4000
      IDX_SERVICE_SECRET: ${IDX_SERVICE_SECRET:?IDX_SERVICE_SECRET is required in .env}
      FRONTEND_URL: ${ADMIN_FRONTEND_URL:?ADMIN_FRONTEND_URL is required in .env}
    ports:
      - "3002:3002"
    depends_on:
      idx-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3002/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s