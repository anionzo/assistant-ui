services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  idx-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    env_file:
      - apps/idx-api/.env
    command: >
      sh -lc "export CI=true &&
      corepack enable &&
      pnpm install --filter @idx/idx-api &&
      pnpm --filter @idx/idx-api db:bootstrap &&
      pnpm --filter @idx/idx-api dev"
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/idx_api
      GOOGLE_CALLBACK_URL: http://localhost:4000/auth/google/callback
      FRONTEND_URL: http://localhost:3001
    ports:
      - "4000:4000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/apps/idx-api/node_modules

  idx-chat-user:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    env_file:
      - apps/user-chat/.env.local
    command: >
      sh -lc "export CI=true &&
      corepack enable &&
      pnpm install --filter @idx/user-chat... &&
      pnpm --filter @idx/user-chat dev"
    environment:
      NODE_ENV: development
      IDX_API_URL: http://idx-api:4000
      FRONTEND_URL: http://localhost:3001
    ports:
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      idx-api:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/apps/user-chat/node_modules
      - /app/packages

  idx-chat-admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    env_file:
      - apps/admin/.env.local
    command: >
      sh -lc "export CI=true &&
      corepack enable &&
      pnpm install --filter @idx/admin... &&
      rm -rf apps/admin/.next &&
      pnpm --filter @idx/admin dev"
    environment:
      NODE_ENV: development
      IDX_API_URL: http://idx-api:4000
      FRONTEND_URL: http://localhost:3002

    ports:
      - "3002:3002"
    depends_on:
      idx-api:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/apps/admin/node_modules
      - /app/packages

volumes:
  mongodata: