services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: idx_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d idx_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  idx-api:
    build:
      context: .
      dockerfile: apps/idx-api/Dockerfile
    command: >
      sh -lc "corepack enable &&
      pnpm install --filter @idx/idx-api &&
      pnpm --filter @idx/idx-api dev"
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/idx_auth
      JWT_SECRET: replace-me-in-compose
      JWT_ACCESS_TTL: 3600
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: http://localhost:4000/auth/google/callback
      FRONTEND_URL: http://localhost:3001
      MODULAR_RAG_GATEWAY_URL: http://host.docker.internal:8030
      USER_API_KEY: demo-api-key
      ADMIN_API_KEY: demo-admin-key
      IDX_SERVICE_SECRET: dev-service-secret
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/apps/idx-api/node_modules

  idx-chat-user:
    build:
      context: .
      dockerfile: apps/user-chat/Dockerfile
    command: >
      sh -lc "corepack enable &&
      pnpm install --filter @idx/user-chat... &&
      pnpm --filter @idx/user-chat dev"
    environment:
      PORT: 3000
      IDX_API_URL: http://idx-api:4000
      IDX_SERVICE_SECRET: dev-service-secret
      TENANT_ID: huit_admission_chatbot
      JWT_SECRET: replace-me-in-compose
      AUTH_REQUIRED: "false"
      FRONTEND_URL: http://localhost:3001
    ports:
      - "3001:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      idx-api:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/apps/user-chat/node_modules
      - /app/packages

volumes:
  pgdata: