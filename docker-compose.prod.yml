# Idx Chat production stack (E07 + E09).
# ModularRAG gateway stays external — only idx-api holds gateway URL and keys.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#   curl http://localhost:3001/api/health
#   curl http://localhost:4000/health

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - idx_mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  idx-api:
    build:
      context: .
      dockerfile: apps/idx-api/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/idx_api
      JWT_SECRET: ${IDX_JWT_SECRET:?IDX_JWT_SECRET is required}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-3600}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:4000/auth/google/callback}
      FRONTEND_URL: ${IDX_FRONTEND_URL:-http://localhost:3001}
      MODULAR_RAG_GATEWAY_URL: ${MODULAR_RAG_GATEWAY_URL:-http://host.docker.internal:8030}
      USER_API_KEY: ${USER_API_KEY:?USER_API_KEY is required}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?ADMIN_API_KEY is required}
      IDX_SERVICE_SECRET: ${IDX_SERVICE_SECRET:?IDX_SERVICE_SECRET is required}
      NODE_ENV: production
      SELF_SERVICE_PASSWORD_RESET_ENABLED: ${SELF_SERVICE_PASSWORD_RESET_ENABLED:-false}
    ports:
      - "4000:4000"
    depends_on:
      mongo:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  idx-chat-user:
    build:
      context: .
      dockerfile: apps/user-chat/Dockerfile
    restart: unless-stopped
    environment:
      IDX_API_URL: http://idx-api:4000
      IDX_SERVICE_SECRET: ${IDX_SERVICE_SECRET:?IDX_SERVICE_SECRET is required}
      TENANT_ID: ${TENANT_ID:-huit_admission_chatbot}
      TENANT_DISPLAY_NAME: ${TENANT_DISPLAY_NAME:-HUIT Admission Chatbot}
      DEFAULT_CORPUS_ID: ${DEFAULT_CORPUS_ID:-admission-chatbot-corpus}
      DEFAULT_CHAT_PIPELINE: ${DEFAULT_CHAT_PIPELINE:-huit_chat_multi_query_prod}
      DEFAULT_VOICE_PIPELINE: ${DEFAULT_VOICE_PIPELINE:-huit_voice_multi_query_prod}
      DEFAULT_TOP_K: ${DEFAULT_TOP_K:-5}
      JWT_SECRET: ${IDX_JWT_SECRET:?IDX_JWT_SECRET is required}
      AUTH_REQUIRED: "true"
      FRONTEND_URL: ${IDX_FRONTEND_URL:-http://localhost:3001}
      NODE_ENV: production
      SELF_SERVICE_PASSWORD_RESET_ENABLED: ${SELF_SERVICE_PASSWORD_RESET_ENABLED:-false}
    ports:
      - "3001:3000"
    depends_on:
      idx-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  idx-chat-admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    environment:
      IDX_API_URL: http://idx-api:4000
      IDX_SERVICE_SECRET: ${IDX_SERVICE_SECRET:?IDX_SERVICE_SECRET is required}
      ADMIN_IP_ALLOWLIST: ${ADMIN_IP_ALLOWLIST:-127.0.0.1,10.0.0.0/8}
      FRONTEND_URL: ${IDX_ADMIN_FRONTEND_URL:-http://localhost:3002}
    ports:
      - "3002:3002"
    depends_on:
      idx-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3002/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

volumes:
  idx_mongodata: